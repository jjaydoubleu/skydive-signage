<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skydive Signage — Controller</title>
<script src="/socket.io/socket.io.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1916;
    --muted: #6b6960;
    --accent: #d4580a;
    --accent-light: #fff0e8;
    --blue: #1d5fa8;
    --blue-light: #e8f0fb;
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --yellow: #a06c00;
    --yellow-light: #fff8e0;
    --radius: 10px;
    --font: 'DM Sans', sans-serif;
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@500&display=swap');

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header .logo {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }

  header .logo span {
    color: var(--accent);
  }

  .live-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
    animation: pulse 1.4s ease-in-out infinite;
    margin-left: auto;
  }
  .live-label { font-size: 12px; color: var(--muted); }

  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }

  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 24px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 560px) { main { grid-template-columns: 1fr; } }

  .full { grid-column: 1 / -1; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }

  /* Trip list */
  .trip-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .trip-row:last-child { border-bottom: none; }

  .trip-time {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    min-width: 58px;
  }

  .badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 99px;
    white-space: nowrap;
  }
  .badge-checkin    { background: var(--blue-light);   color: var(--blue); }
  .badge-briefing   { background: var(--yellow-light); color: var(--yellow); }
  .badge-finalcheck { background: var(--green-light);  color: var(--green); }
  .badge-departed   { background: #f0efeb; color: var(--muted); }
  .badge-upcoming   { background: #f0efeb; color: var(--muted); }

  .trip-btns { display: flex; gap: 6px; margin-left: auto; }

  .btn {
    font-family: var(--font);
    font-size: 12px;
    font-weight: 500;
    padding: 5px 11px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    color: var(--text);
    transition: background 0.12s;
  }
  .btn:hover { background: var(--bg); }
  .btn-primary  { background: var(--accent-light); border-color: #f0c09a; color: var(--accent); }
  .btn-primary:hover { background: #fde4cd; }
  .btn-blue     { background: var(--blue-light);   border-color: #b8d0f5; color: var(--blue); }
  .btn-blue:hover { background: #d1e3fa; }
  .btn-danger   { background: #fff0f0; border-color: #f5c0c0; color: #b83232; }
  .btn-danger:hover { background: #ffe0e0; }

  /* Quick message buttons */
  .msg-btn {
    width: 100%;
    text-align: left;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-family: var(--font);
    margin-bottom: 8px;
    transition: background 0.12s, border-color 0.12s;
  }
  .msg-btn:last-child { margin-bottom: 0; }
  .msg-btn:hover { background: var(--bg); border-color: #ccc9bf; }

  .msg-btn .icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .icon-blue   { background: var(--blue-light);   color: var(--blue); }
  .icon-yellow { background: var(--yellow-light); color: var(--yellow); }
  .icon-green  { background: var(--green-light);  color: var(--green); }
  .icon-orange { background: var(--accent-light); color: var(--accent); }
  .icon-gray   { background: #f0efeb; color: var(--muted); }

  .msg-btn .msg-text { font-size: 13px; font-weight: 500; line-height: 1.4; }
  .msg-btn .msg-sub  { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Trip selector */
  select {
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    width: 100%;
    cursor: pointer;
  }

  /* Current display status bar */
  .status-bar {
    background: #1a1916;
    color: #e8e6df;
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    grid-column: 1 / -1;
  }
  .status-bar .label { font-size: 11px; color: #6b6860; text-transform: uppercase; letter-spacing: 0.07em; }
  .status-bar .value { font-size: 14px; font-weight: 500; margin-top: 2px; }

  .pushed-anim {
    animation: flashGreen 0.6s ease;
  }
  @keyframes flashGreen {
    0%   { background: #063a1e; }
    100% { background: #1a1916; }
  }

  h2 { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="logo">&#x2708;&#xFE0F; Skydive <span>Signage</span></div>
  <span class="live-label">Display live</span>
  <div class="live-dot"></div>
</header>

<main>

  <div class="status-bar" id="status-bar">
    <div>
      <div class="label">Currently showing</div>
      <div class="value" id="current-msg">Welcome screen</div>
    </div>
  </div>

  <!-- Trip schedule -->
  <div class="card full">
    <div class="card-title">Trip schedule</div>
    <div id="trip-list"></div>
  </div>

  <!-- Trip selector -->
  <div class="card">
    <div class="card-title">Selected trip</div>
    <select id="trip-select" onchange="updateLabels()">
      <option>7:00am</option><option>7:30am</option><option>8:00am</option>
      <option>8:30am</option><option>9:00am</option><option>9:30am</option>
      <option>10:00am</option><option>10:30am</option><option>11:00am</option>
      <option>11:30am</option><option>12:00pm</option>
    </select>
    <p style="font-size:11px; color:var(--muted); margin-top:8px;">Used by the quick message buttons below</p>

    <div style="margin-top:14px; padding-top:14px; border-top:1px solid var(--border);">
      <label style="font-size:11px; color:var(--muted); font-weight:600; letter-spacing:0.06em; text-transform:uppercase; display:block; margin-bottom:6px;">Briefing countdown</label>
      <div style="display:flex; align-items:center; gap:10px;">
        <input type="range" id="briefing-mins" min="5" max="60" step="5" value="30" style="flex:1;" oninput="document.getElementById('bm-val').textContent=this.value">
        <span id="bm-val" style="font-size:15px; font-weight:500; min-width:28px; font-variant-numeric:tabular-nums;">30</span>
        <span style="font-size:12px; color:var(--muted);">min</span>
      </div>
      <p style="font-size:11px; color:var(--muted); margin-top:5px;">Countdown shown on the check-in screen</p>
    </div>
  </div>

  <!-- Quick messages -->
  <div class="card">
    <div class="card-title">Quick messages</div>

    <button class="msg-btn" onclick="push('checkin')">
      <div class="icon icon-blue">&#x2713;</div>
      <div><div class="msg-text" id="lbl-checkin">Check-in open — 7:00am trip</div><div class="msg-sub">Shows briefing countdown timer on TV</div></div>
    </button>

    <button class="msg-btn" onclick="push('briefing')">
      <div class="icon icon-yellow">&#x25B6;</div>
      <div><div class="msg-text" id="lbl-briefing">Safety briefing — 7:00am group</div><div class="msg-sub">Shows 10-min countdown timer</div></div>
    </button>

    <button class="msg-btn" onclick="push('finalcheck')">
      <div class="icon icon-green">&#x2714;</div>
      <div><div class="msg-text" id="lbl-finalcheck">Final checks — 7:00am group</div><div class="msg-sub">Briefing done, come to counter</div></div>
    </button>

    <button class="msg-btn" onclick="push('transport')">
      <div class="icon icon-orange">&#x1F68C;</div>
      <div><div class="msg-text">Transport check</div><div class="msg-sub">Bus or driving yourself?</div></div>
    </button>

    <button class="msg-btn" onclick="push('idle')">
      <div class="icon icon-gray">&#x2302;</div>
      <div><div class="msg-text">Return to welcome screen</div><div class="msg-sub">Clears the display</div></div>
    </button>
  </div>

</main>

<script>
const socket = io();

const trips = ['7:00am','7:30am','8:00am','8:30am','9:00am','9:30am','10:00am','10:30am','11:00am','11:30am','12:00pm'];
const statuses = {};
trips.forEach((t, i) => {
  statuses[t] = i < 2 ? 'departed' : i === 2 ? 'finalcheck' : i === 3 ? 'briefing' : i === 4 ? 'checkin' : 'upcoming';
});

const statusLabel = { departed:'Departed', briefing:'In briefing', finalcheck:'Final checks', checkin:'Checking in', upcoming:'Upcoming' };
const statusBadge = { departed:'badge-departed', briefing:'badge-briefing', finalcheck:'badge-finalcheck', checkin:'badge-checkin', upcoming:'badge-upcoming' };

function renderTrips() {
  document.getElementById('trip-list').innerHTML = trips.map(t => {
    const s = statuses[t];
    return `<div class="trip-row">
      <span class="trip-time">${t}</span>
      <span class="badge ${statusBadge[s]}">${statusLabel[s]}</span>
      <div class="trip-btns">
        ${s !== 'departed' ? `<button class="btn btn-blue" onclick="setAndPush('${t}','briefing')">Briefing</button>` : ''}
        ${s !== 'departed' ? `<button class="btn btn-primary" onclick="setAndPush('${t}','finalcheck')">Final check</button>` : ''}
        ${s !== 'departed' ? `<button class="btn btn-danger" onclick="setStatus('${t}','departed')">Departed ✓</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function setStatus(trip, status) {
  statuses[trip] = status;
  renderTrips();
}

function setAndPush(trip, status) {
  setStatus(trip, status);
  document.getElementById('trip-select').value = trip;
  updateLabels();
  push(status);
}

function selectedTrip() { return document.getElementById('trip-select').value; }

function updateLabels() {
  const t = selectedTrip();
  document.getElementById('lbl-checkin').textContent   = `Check-in open — ${t} trip`;
  document.getElementById('lbl-briefing').textContent  = `Safety briefing — ${t} group`;
  document.getElementById('lbl-finalcheck').textContent = `Final checks — ${t} group`;
}

function push(type) {
  const trip = selectedTrip();
  const briefingMins = parseInt(document.getElementById('briefing-mins').value, 10);
  const msg = { type, trip };
  if (type === 'checkin') msg.briefingMins = briefingMins;
  socket.emit('push', msg);
  const msgs = {
    idle:       'Welcome screen',
    checkin:    `Check-in open — ${trip}`,
    briefing:   `Safety briefing — ${trip}`,
    finalcheck: `Final checks — ${trip}`,
    transport:  'Transport check',
  };
  document.getElementById('current-msg').textContent = msgs[type] || type;
  const bar = document.getElementById('status-bar');
  bar.classList.remove('pushed-anim');
  void bar.offsetWidth;
  bar.classList.add('pushed-anim');
}

renderTrips();
</script>
</body>
</html>
